<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Euroswarms</title>
<link rel="stylesheet" href="_ds/euroswarms-design-system-695957dd-4d70-4192-a06e-943ee951a25f/tokens/fonts.css">
<link rel="stylesheet" href="shared/site.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared/tweaks-panel.jsx"></script>
<script type="text/babel" src="shared/site-chrome.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "void",
  "motion": true,
  "counter": true
}/*EDITMODE-END*/;

function ContactPage() {
  const [t, setTweak] = useSiteTweaks(TWEAK_DEFAULTS);
  return (
    <SiteFrame current="contact.html" t={t} setTweak={setTweak}>
      <PageHead n="VII" latin="Litterae" refCode="ES/RD/2026/060" title="Correspondence"
        lede="For research inquiries, collaboration proposals, or technical discussion. We welcome correspondence from researchers, institutions, and organizations interested in collaboration or technical exchange." />

      <div className="x-wrap" style={{ paddingTop: '3.5rem' }}>
        <section data-screen-label="Channels" style={{ marginBottom: '5rem' }}>
          <Sec n="VII·I" latin="Canales" title="Official Channels" />
          <table className="x-table" style={{ maxWidth: '58rem' }}>
            <caption>Correspondence register</caption>
            <thead>
              <tr><th>Subject</th><th>Channel</th><th>Expected response</th></tr>
            </thead>
            <tbody>
              <tr>
                <td>Research inquiries &amp; collaboration</td>
                <td className="mono"><a href="mailto:research@euroswarms.eu">research@euroswarms.eu</a></td>
                <td style={{ color: 'var(--x-muted)' }}>Within 10 working days</td>
              </tr>
              <tr>
                <td>Volunteer appointments</td>
                <td className="mono"><a href="mailto:research@euroswarms.eu">research@euroswarms.eu</a> <span style={{ color: 'var(--x-faint)' }}>(cite ref №)</span></td>
                <td style={{ color: 'var(--x-muted)' }}>Every complete application</td>
              </tr>
              <tr>
                <td>Defects in released artifacts</td>
                <td className="mono"><a href="https://github.com/IlumCI/CR-CA/issues" target="_blank">github.com/IlumCI/CR-CA/issues</a></td>
                <td style={{ color: 'var(--x-muted)' }}>Public tracker</td>
              </tr>
            </tbody>
          </table>
        </section>

        <section data-screen-label="Primary contact">
          <div className="x-panel blue" style={{ padding: '3rem', maxWidth: '40rem' }}>
            <span className="x-mono"><span className="au">Primary channel</span></span>
            <p style={{ fontFamily: 'var(--font-serif)', fontSize: '1.9rem', margin: '0 0 1rem', color: '#fff' }}>
              <a href="mailto:research@euroswarms.eu" style={{ color: 'var(--x-gold)', borderBottom: 'none' }}>research@euroswarms.eu</a>
            </p>
            <p style={{ margin: 0 }}>
              Plain-text correspondence preferred. No form; no ticketing system; a person reads every letter.
            </p>
          </div>
        </section>
      </div>
    </SiteFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ContactPage />);
</script>
</body>
</html>
