<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volunteer Appointments — Euroswarms</title>
<link rel="stylesheet" href="_ds/euroswarms-design-system-695957dd-4d70-4192-a06e-943ee951a25f/tokens/fonts.css?v=6">
<link rel="stylesheet" href="shared/site.css?v=6">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared/tweaks-panel.jsx?v=6"></script>
<script type="text/babel" src="shared/reactbits.jsx?v=6"></script>
<script type="text/babel" src="shared/site-chrome.jsx?v=6"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "void",
  "motion": true,
  "counter": true
}/*EDITMODE-END*/;

const POSITIONS = [
  ['ES/V/2026/011', 'Research Engineer — Architectures', 'MetaModel / Stable Cognition', 'PyTorch; transformer internals; hypernetworks or evolutionary methods welcome.'],
  ['ES/V/2026/012', 'Researcher — Causal Modeling', 'CR-CA / CR-CA-Q', 'Structural causal models, counterfactual inference, probabilistic methods.'],
  ['ES/V/2026/013', 'Systems Engineer — Training Infrastructure', 'All programmes', 'Multi-GPU training, dataset pipelines, reproducible release engineering.'],
  ['ES/V/2026/014', 'Technical Writer — Documentation', 'All programmes', 'Precise institutional prose; ability to read code and papers.'],
];

function VolunteerPage() {
  const [t, setTweak] = useSiteTweaks(TWEAK_DEFAULTS);
  return (
    <SiteFrame current="volunteer.html" docRef="ES/RD/2026/050" t={t} setTweak={setTweak}>
      <PageHead n="VI" latin="Officium" refCode="ES/RD/2026/050" title="Volunteer Appointments"
        lede="The Institute conducts its research through volunteer appointments. All positions are unpaid; all work is published openly under the contributor's name. Appointments are remote and part-time by default." />

      <div className="x-wrap" style={{ paddingTop: '3rem' }}>
        <section data-screen-label="Positions" style={{ marginBottom: '4.5rem' }}>
          <Sec n="VI·I" latin="Munera" title="Open Positions" />
          <div className="x-scroll">
            <table className="x-table">
              <caption>Appointments register — series V</caption>
              <thead>
                <tr><th>Ref</th><th>Appointment</th><th>Programme</th><th>Expected competence</th><th>Status</th></tr>
              </thead>
              <tbody>
                {POSITIONS.map(([ref, title, prog, req], i) => (
                  <Reveal as="tr" key={ref} delay={i * 45}>
                    <td className="mono">{ref}</td>
                    <td className="name">{title}</td>
                    <td style={{ color: 'var(--x-muted)' }}>{prog}</td>
                    <td style={{ color: 'var(--x-muted)', fontSize: '0.84rem' }}>{req}</td>
                    <td><span className="x-status">Open</span></td>
                  </Reveal>
                ))}
              </tbody>
            </table>
          </div>
        </section>

        <section data-screen-label="Terms" style={{ marginBottom: '4.5rem' }}>
          <Sec n="VI·II" latin="Condiciones" title="Terms of Appointment" />
          <div className="x-grid2">
            <div className="x-panel">
              <span className="x-mono"><span className="au">Provided</span></span>
              <h3>What the Institute provides</h3>
              <ul className="x-list" style={{ marginTop: '0.75rem' }}>
                <li>A chartered programme with a written mandate and reference number.</li>
                <li>Authorship on publications, in proportion to contribution.</li>
                <li>Public attribution on all released code, weights, and datasets.</li>
              </ul>
            </div>
            <div className="x-panel">
              <span className="x-mono" style={{ color: 'var(--x-faint)' }}>Not provided</span>
              <h3>What the Institute does not provide</h3>
              <ul className="x-list" style={{ marginTop: '0.75rem' }}>
                <li>Remuneration of any kind. Appointments are strictly voluntary.</li>
                <li>Equipment or compute beyond what programmes already hold.</li>
                <li>Exclusivity — contributors remain free to work elsewhere.</li>
              </ul>
            </div>
          </div>
        </section>

        <GlyphRule label="Procedure" />

        <section data-screen-label="Apply" style={{ marginBottom: '4.5rem' }}>
          <div className="x-panel primary" style={{ padding: '2.75rem', maxWidth: '58rem' }}>
            <span className="x-mono"><span className="au">Application procedure</span></span>
            <h3 style={{ fontSize: '1.5rem' }}>Submit by correspondence.</h3>
            <p style={{ marginBottom: '1.5rem' }}>
              Write to the division citing the appointment reference number, with a short account of relevant work — repositories, papers, or artifacts. There is no form. Every complete application receives a reply.
            </p>
            <a href="mailto:research@euroswarms.eu" className="x-status">research@euroswarms.eu →</a>
          </div>
        </section>
      </div>
    </SiteFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VolunteerPage />);
</script>
</body>
</html>
