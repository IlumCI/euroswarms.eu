<link rel="stylesheet" href="shared/site.css?v=8">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared/tweaks-panel.jsx?v=8"></script>
<script type="text/babel" src="shared/reactbits.jsx?v=8"></script>
<script type="text/babel" src="shared/site-chrome.jsx?v=8"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "void",
  "motion": true,
  "counter": true
}/*EDITMODE-END*/;

function PublicationsPage() {
  const [t, setTweak] = useSiteTweaks(TWEAK_DEFAULTS);
  return (
    <SiteFrame current="publications.html" t={t} setTweak={setTweak}>
      <PageHead n="IV" latin="Acta" refCode="ES/RD/2026/040" title="Publications"
        lede="White papers and technical reports from Euroswarms R&D Division. Each entry is deposited in a public registry under a permanent identifier and carries a reference number in the Institute's document series." />

      <div className="x-wrap" style={{ paddingTop: '3rem' }}>
        <section data-screen-label="Publication index" style={{ marginBottom: '4rem' }}>
          <Sec n="IV·0" latin="Index" title="Document Index" />
          <div className="x-scroll">
            <table className="x-table">
              <caption>Document index — series P</caption>
              <thead>
                <tr><th>Ref</th><th>Title</th><th>Author</th><th>Type</th><th>Date</th></tr>
              </thead>
              <tbody>
                <Reveal as="tr" delay={0}>
                  <td className="mono">ES/P/2026/001</td>
                  <td className="name"><a href="papers/ES-P-2026-001.pdf">CR-CA: A Two-Tier Framework for Structured Causal Reasoning and Counterfactual Analysis</a></td>
                  <td style={{ color: 'var(--x-muted)' }}>Arron Leilion</td>
                  <td style={{ color: 'var(--x-muted)' }}>White paper</td>
                  <td className="mono">2026-05-27</td>
                </Reveal>
              </tbody>
            </table>
          </div>
        </section>

        <section data-screen-label="Publication detail" style={{ marginBottom: '4.5rem' }}>
          <Sec n="IV·I" latin="Acta plena" title="Entries" />
          <div className="x-panel primary" style={{ padding: '2.25rem', maxWidth: '58rem', marginBottom: '1.5rem' }}>
            <span className="x-mono" style={{ display: 'flex', justifyContent: 'space-between', gap: '1rem' }}>
              <span><span className="au">White paper</span> · Arron Leilion — 2026-05-27</span>
              <span style={{ color: 'var(--x-faint)' }}>ES/P/2026/001</span>
            </span>
            <h3 style={{ fontSize: '1.4rem' }}>CR-CA: A Two-Tier Framework for Structured Causal Reasoning and Counterfactual Analysis</h3>
            {/* .x-panel p zeroes margins — space the two paragraphs explicitly. */}
            <p style={{ marginBottom: '0.9rem' }}>
              CR-CA (Causal Reasoning — Counterfactual Analysis) draws an explicit line through its own reasoning. The strict tier, <span className="mono">crca_core</span>, performs formal causal identification, estimation, and spec lifecycle management. The heuristic tier, <span className="mono">CRCAAgent</span>, performs LLM-integrated causal exploration, automatic variable extraction, and deterministic causal simulation with OLS-learned edge coefficients and polynomial mechanism discovery. The boundary between the two is auditable and configurable rather than implied.
            </p>
            <p style={{ marginBottom: '1.4rem' }}>
              The paper reports a code audit and a formal benchmark suite validating the implementation against Pearl's causal hierarchy. CR-CA outperforms naive OLS on collider (0.50× Oracle error) and fork (5.69× Oracle error) scenarios, evidence that descendant-only propagation yields correct intervention semantics where confounders are absent. It is recorded as insufficient where they are not: closing the gap on confounded scenarios requires proper identification algorithms — backdoor, frontdoor, instrumental variables.
            </p>
            <span style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'baseline', gap: '1.75rem' }}>
              <a href="papers/ES-P-2026-001.pdf" className="x-status">Read the paper — PDF →</a>
              <a href="https://doi.org/10.5281/zenodo.20419201" target="_blank" className="x-mono" style={{ color: 'var(--x-muted)' }}>doi.org/10.5281/zenodo.20419201 →</a>
            </span>
          </div>

          <table className="x-record" style={{ maxWidth: '58rem' }}>
            <caption>Deposit record — ES/P/2026/001</caption>
            <tbody>
              <tr><th>Author</th><td>Arron Leilion — Euroswarms Institute; Swarms Corporation</td></tr>
              <tr><th>Document type</th><td>White paper</td></tr>
              <tr><th>Version</th><td className="mono">2.0.0</td></tr>
              <tr><th>Document</th><td className="mono"><a href="papers/ES-P-2026-001.pdf">ES-P-2026-001.pdf</a> <span style={{ color: 'var(--x-faint)' }}>— 9 pp · 258 kB</span></td></tr>
              <tr><th>Deposited</th><td className="mono">2026-05-27 · Zenodo</td></tr>
              <tr><th>Identifier</th><td className="mono"><a href="https://doi.org/10.5281/zenodo.20419201" target="_blank">10.5281/zenodo.20419201</a></td></tr>
              <tr><th>Licence</th><td>Creative Commons Attribution 4.0 International</td></tr>
              <tr><th>Source</th><td className="mono"><a href="https://github.com/Euroswarms-Institute/CR-CA" target="_blank">github.com/Euroswarms-Institute/CR-CA</a></td></tr>
              <tr><th>Status</th><td><span className="x-status">Released</span></td></tr>
            </tbody>
          </table>
        </section>
      </div>
    </SiteFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PublicationsPage />);
</script>
