<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Publications — Euroswarms</title>
<link rel="stylesheet" href="_ds/euroswarms-design-system-695957dd-4d70-4192-a06e-943ee951a25f/tokens/fonts.css">
<link rel="stylesheet" href="shared/site.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared/tweaks-panel.jsx"></script>
<script type="text/babel" src="shared/site-chrome.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "void",
  "motion": true,
  "counter": true
}/*EDITMODE-END*/;

function PublicationsPage() {
  const [t, setTweak] = useSiteTweaks(TWEAK_DEFAULTS);
  return (
    <SiteFrame current="publications.html" t={t} setTweak={setTweak}>
      <PageHead n="IV" latin="Acta" refCode="ES/RD/2026/040" title="Publications"
        lede="Peer-reviewed publications, preprints, and technical reports from Euroswarms R&D Division. Each entry carries a permanent reference number in the Institute's document series." />

      <div className="x-wrap" style={{ paddingTop: '3.5rem' }}>
        <section data-screen-label="Publication index" style={{ marginBottom: '4rem' }}>
          <table className="x-table">
            <caption>Document index — series P</caption>
            <thead>
              <tr><th>Ref</th><th>Title</th><th>Author</th><th>Year</th></tr>
            </thead>
            <tbody>
              <tr>
                <td className="mono">ES/P/2026/001</td>
                <td style={{ fontFamily: 'var(--font-serif)', fontSize: '1.05rem' }}>Causal Reasoning and Counterfactual Analysis: A Framework for Deterministic Agent Systems</td>
                <td style={{ color: 'var(--x-muted)' }}>Euroswarms R&amp;D Division</td>
                <td className="mono">2026</td>
              </tr>
              <tr>
                <td className="mono">ES/P/2026/002</td>
                <td style={{ fontFamily: 'var(--font-serif)', fontSize: '1.05rem' }}>Causal Reasoning Architectures for Deterministic Agent Systems</td>
                <td style={{ color: 'var(--x-muted)' }}>Arron Leilion</td>
                <td className="mono">2026</td>
              </tr>
            </tbody>
          </table>
        </section>

        <section data-screen-label="Publication detail">
          <div className="x-panel blue" style={{ padding: '2.5rem', maxWidth: '58rem', marginBottom: '1.5rem' }}>
            <span className="x-mono"><span className="au">Official publication</span></span>
            <h3 style={{ fontSize: '1.6rem' }}>Causal Reasoning and Counterfactual Analysis: A Framework for Deterministic Agent Systems</h3>
            <p style={{ marginBottom: '1.25rem' }}>
              A comprehensive framework for causal reasoning and counterfactual analysis, combining structural causal models (SCMs) with large language model integration.
            </p>
            <a href="https://arxiv.org/" target="_blank" className="x-mono" style={{ color: 'var(--x-gold)' }}>arXiv:2026.xxxxx →</a>
          </div>

          <div className="x-panel" style={{ padding: '2.5rem', maxWidth: '58rem' }}>
            <span className="x-mono">Arron Leilion — 2026</span>
            <h3 style={{ fontSize: '1.6rem' }}>Causal Reasoning Architectures for Deterministic Agent Systems</h3>
            <p style={{ marginBottom: '1.25rem' }}>
              A formal framework for structural causality modeling in agentic systems with applications to explainable AI and constraint-driven decision processes.
            </p>
            <a href="https://arxiv.org/" target="_blank" className="x-mono">arXiv:2026.xxxxx →</a>
          </div>
        </section>
      </div>
    </SiteFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PublicationsPage />);
</script>
</body>
</html>
