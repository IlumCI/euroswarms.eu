</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared/tweaks-panel.jsx?v=7"></script>
<script type="text/babel" src="shared/reactbits.jsx?v=7"></script>
<script type="text/babel" src="shared/site-chrome.jsx?v=7"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "void",
  "motion": true,
  "counter": true
}/*EDITMODE-END*/;

function PublicationsPage() {
  const [t, setTweak] = useSiteTweaks(TWEAK_DEFAULTS);
  return (
    <SiteFrame current="publications.html" docRef="ES/RD/2026/040" t={t} setTweak={setTweak}>
      <PageHead n="IV" latin="Acta" refCode="ES/RD/2026/040" title="Publications"
        lede="Peer-reviewed publications, preprints, and technical reports from Euroswarms R&D Division. Each entry carries a permanent reference number in the Institute's document series." />

      <div className="x-wrap" style={{ paddingTop: '3rem' }}>
        <section data-screen-label="Publication index" style={{ marginBottom: '4rem' }}>
          <Sec n="IV·0" latin="Index" title="Document Index" />
          <div className="x-scroll">
            <table className="x-table">
              <caption>Document index — series P</caption>
              <thead>
                <tr><th>Ref</th><th>Title</th><th>Author</th><th>Year</th></tr>
              </thead>
              <tbody>
                <Reveal as="tr" delay={0}>
                  <td className="mono">ES/P/2026/001</td>
                  <td className="name">Causal Reasoning and Counterfactual Analysis: A Framework for Deterministic Agent Systems</td>
                  <td style={{ color: 'var(--x-muted)' }}>Euroswarms R&amp;D Division</td>
                  <td className="mono">2026</td>
                </Reveal>
                <Reveal as="tr" delay={45}>
                  <td className="mono">ES/P/2026/002</td>
                  <td className="name">Causal Reasoning Architectures for Deterministic Agent Systems</td>
                  <td style={{ color: 'var(--x-muted)' }}>Arron Leilion</td>
                  <td className="mono">2026</td>
                </Reveal>
              </tbody>
            </table>
          </div>
        </section>

        <section data-screen-label="Publication detail" style={{ marginBottom: '4.5rem' }}>
          <Sec n="IV·I" latin="Acta plena" title="Entries" />
          <div className="x-panel primary" style={{ padding: '2.25rem', maxWidth: '58rem', marginBottom: '1.25rem' }}>
            <span className="x-mono" style={{ display: 'flex', justifyContent: 'space-between', gap: '1rem' }}>
              <span><span className="au">Official publication</span></span>
              <span style={{ color: 'var(--x-faint)' }}>ES/P/2026/001</span>
            </span>
            <h3 style={{ fontSize: '1.4rem' }}>Causal Reasoning and Counterfactual Analysis: A Framework for Deterministic Agent Systems</h3>
            <p style={{ marginBottom: '1.1rem' }}>
              A comprehensive framework for causal reasoning and counterfactual analysis, combining structural causal models (SCMs) with large language model integration.
            </p>
            <a href="https://arxiv.org/" target="_blank" className="x-status">arXiv:2026.xxxxx →</a>
          </div>

          <div className="x-panel" style={{ padding: '2.25rem', maxWidth: '58rem' }}>
            <span className="x-mono" style={{ display: 'flex', justifyContent: 'space-between', gap: '1rem' }}>
              <span>Arron Leilion — 2026</span>
              <span style={{ color: 'var(--x-faint)' }}>ES/P/2026/002</span>
            </span>
            <h3 style={{ fontSize: '1.4rem' }}>Causal Reasoning Architectures for Deterministic Agent Systems</h3>
            <p style={{ marginBottom: '1.1rem' }}>
              A formal framework for structural causality modeling in agentic systems with applications to explainable AI and constraint-driven decision processes.
            </p>
            <a href="https://arxiv.org/" target="_blank" className="x-status">arXiv:2026.xxxxx →</a>
          </div>
        </section>
      </div>
    </SiteFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PublicationsPage />);
</script>
