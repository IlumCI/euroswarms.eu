name: Deploy to GitHub Pages

# The site is build-free: every page is a single HTML file loading React and
# Babel from SRI-pinned CDN scripts. There is nothing to compile, so the repo
# root is uploaded as the Pages artifact directly — no pnpm, no dist/.
#
# Trigger is main only. institutional-redesign was removed: that branch still
# holds the old Vite app, and leaving it here meant any push there would build
# and publish that app straight over euroswarms.eu.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race for the live domain; queue instead of cancelling
# so a run that is already publishing is allowed to finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
